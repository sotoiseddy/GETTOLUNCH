<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gettolunch - Drawing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="toolbar" id="toolbar">
      <button id="pencil" class="tool active">Pencil</button>
      <button id="eraser" class="tool">Eraser</button>
      <button id="blender" class="tool">Blender</button>
      <label class="control">
        Size
        <input id="size" type="range" min="1" max="50" value="4" />
      </label>
      <label class="control">
        Color
        <input id="color" type="color" value="#000000" />
      </label>
      <label class="control" id="blendOpacityGroup">
        Mix Str
        <input id="blendOpacity" type="range" min="0.05" max="1" step="0.05" value="0.5" />
      </label>
      <button id="clear">Clear</button>
      <div class="room-badge" id="roomBadge"></div>
    </div>
    <div class="users-bar" id="usersBar"></div>
    <script src="draw.js" defer></script>
  </body>
</html>
