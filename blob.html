<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movable Blob</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .blob {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 45% 55% 50% 50% / 50% 50% 55% 45%;
            cursor: grab;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.1s ease-out;
        }

        .blob:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .blob-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="blob">
        <span class="blob-text">🎈</span>
    </div>
    <div class="info">
        <p>Drag the blob to move it around!</p>
    </div>

    <script>
        const blob = document.querySelector('.blob');
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        // Start dragging
        blob.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = blob.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        });

        // Move blob while dragging
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                blob.style.left = (e.clientX - offsetX) + 'px';
                blob.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        // Stop dragging
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Initialize blob position at center
        const blobSize = 150;
        blob.style.left = (window.innerWidth / 2 - blobSize / 2) + 'px';
        blob.style.top = (window.innerHeight / 2 - blobSize / 2) + 'px';
    </script>
</body>
</html>
